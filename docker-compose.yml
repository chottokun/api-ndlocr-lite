services:
  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      - PYTHONPATH=/home/appuser/app:/home/appuser/app/extern/ndlocr-lite/src
    volumes:
      - .:/home/appuser/app
      - /home/appuser/app/.venv  # Anonymous volume to isolate .venv
    working_dir: /home/appuser/app
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
